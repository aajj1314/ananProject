services:
  # Backend API service
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: elderly-care-backend:latest
    container_name: elderly-care-backend
    env_file:
      - .env.production
    environment:
      - APP_NAME=elderly-insole-platform
      - APP_ENV=production
      - DEBUG=false
      - API_V1_PREFIX=/api/v1
      - DATABASE_URL=sqlite+aiosqlite:///./data/elderly_insole.db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - RATE_LIMIT_REQUESTS=60
      - RATE_LIMIT_WINDOW_SECONDS=60
      - CACHE_TTL_SECONDS=120
      - NOTIFICATION_CHANNELS=["in_app"]
      - ADMIN_PHONE=15577305913
      - ADMIN_PASSWORD=passwor
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend web service
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: elderly-care-frontend:latest
    container_name: elderly-care-frontend
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Redis cache service
  redis:
    image: redis:7.2.4-alpine
    container_name: elderly-care-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# Volumes for persistent data
volumes:
  backend_data:
    driver: local
  redis_data:
    driver: local

# Network configuration
networks:
  app-network:
    driver: bridge
